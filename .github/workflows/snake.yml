name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-snake.svg?color_snake=8A9A70&color_dots=4A5A35,6B7E4F,8A9A70,A8B98A,E8F0D8&color_background=0d1117
            dist/github-contribution-snake-dark.svg?color_snake=E8F0D8&color_dots=4A5A35,6B7E4F,8A9A70,A8B98A,FFFFFF&color_background=0d1117

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
